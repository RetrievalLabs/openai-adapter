name: Coverage Report

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up virtual environment
        run: make venv

      - name: Generate coverage report
        run: make coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-report
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.xml', 'utf8');
            const match = coverage.match(/lines-valid="(\d+)".*lines-covered="(\d+)"/s);
            if (match) {
              const valid = parseInt(match[1]);
              const covered = parseInt(match[2]);
              const percent = ((covered / valid) * 100).toFixed(2);
              const comment = `## Coverage Report\n\n📊 **Code Coverage: ${percent}%** (${covered}/${valid} lines)\n\nFull report available in the artifacts.`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: htmlcov/
          retention-days: 30

      - name: Upload XML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-report
          path: coverage.xml
          retention-days: 30
